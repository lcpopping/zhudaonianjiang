types:["渐进增加重量","增加训练次数","减少休息时间","增加动作复杂度"],

{title:"周期化训练",tag:"purple",
types:["准备期：基础期","比赛期：强化期","过渡期：恢复期"],
points:["分阶段设定目标","调整训练重点","注意恢复周期","避免长期单一训练"]}
],
train:[
{name:"初级增肌计划",desc:"每周3次，每次45分钟。包含上肢推、拉、下肢各2个动作，每个动作3组8-12次。",difficulty:"medium"},

function go(page,partName){
var pages=document.querySelectorAll('.page');
for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
if(page==='part'&&partName){
var p=null;
for(var i=0;i<MODULES.length;i++)if(MODULES[i].name===partName){p=MODULES[i];break;}
if(p)renderPart(p);
document.getElementById('page-part').classList.add('active');
document.getElementById('headerTitle').textContent=p.name;
}else{
document.getElementById('page-home').classList.add('active');
document.getElementById('headerTitle').textContent='运动训练';
if(page==='home')renderHome();
}
var navBtns=document.querySelectorAll('.nav-item');
for(var i=0;i<navBtns.length;i++)navBtns[i].classList.remove('active');
}

function renderHome(){
var html='<div class="card"><div class="card-title">🏋️ 训练模块</div><div class="part-grid">';
for(var i=0;i<MODULES.length;i++){
var p=MODULES[i];
html+='<div class="part-card" onclick="go(\'part\',\''+p.name+'\')"><div class="icon">'+p.icon+'</div><div class="name">'+p.name+'</div><div class="desc">'+p.category+'</div></div>';
}
html+='</div></div>';
document.getElementById('page-home').innerHTML=html;
var navHtml='';
var categories={};
for(var i=0;i<MODULES.length;i++){
var c=MODULES[i].category;
if(!categories[c])categories[c]=[];
categories[c].push(MODULES[i]);
}
var catOrder=['力量训练','柔韧训练','体态训练','综合训练'];
for(var ci=0;ci<catOrder.length;ci++){
var c=catOrder[ci];
if(!categories[c])continue;
navHtml+='<div class="nav-section">'+c+'</div>';
for(var j=0;j<categories[c].length;j++){
var p=categories[c][j];
navHtml+='<div class="nav-item" onclick="go(\'part\',\''+p.name+'\')"><span>'+p.icon+'</span><span>'+p.name+'</span></div>';
}
}
document.getElementById('navList').innerHTML=navHtml;
}

function renderPart(p){
var html='<button class="back-btn" onclick="go(\'home\')">← 返回模块列表</button>';
html+='<div class="card"><p style="font-size:12px;color:#555;line-height:1.8">'+p.desc+'</p></div>';
html+='<div class="section-block"><div class="section-hd" onclick="toggleSection(this)"><span class="tag tag-blue">理论</span><h3>训练原则</h3><span class="arrow">▼</span></div><div class="section-body">';
for(var i=0;i<p.principles.length;i++){
var a=p.principles[i];
html+='<div class="item"><h4><span class="tag tag-'+a.tag+'">'+a.tag+'</span> '+a.title+'</h4>';
if(a.types&&a.types.length>0){
html+='<strong style="font-size:11px;color:#1b4332">类型：</strong><ul>';
for(var j=0;j<a.types.length;j++)html+='<li>'+a.types[j]+'</li>';
html+='</ul>';
}
if(a.points&&a.points.length>0){
html+='<strong style="font-size:11px;color:#1b4332">要点：</strong><ul>';
for(var j=0;j<a.points.length;j++)html+='<li>'+a.points[j]+'</li>';
html+='</ul>';
}
if(a.causes&&a.causes.length>0){
html+='<strong style="font-size:11px;color:#1b4332">原因：</strong><ul>';
for(var j=0;j<a.causes.length;j++)html+='<li>'+a.causes[j]+'</li>';
html+='</ul>';
}
if(a.assess&&a.assess.length>0){
html+='<strong style="font-size:11px;color:#1b4332">自测：</strong><ul>';
for(var j=0;j<a.assess.length;j++)html+='<li>'+a.assess[j]+'</li>';
html+='</ul>';
}
html+='</div>';
}
html+='</div></div>';
html+='<div class="section-block"><div class="section-hd" onclick="toggleSection(this)"><span class="tag tag-green">训练动作</span><h3>训练动作库</h3><span class="arrow">▼</span></div><div class="section-body"><div class="train-grid">';
for(var i=0;i<p.train.length;i++){
var t=p.train[i];
html+='<div class="train-card"><div class="name">'+t.name+'</div><div class="desc">'+t.desc+'</div><span class="difficulty diff-'+t.difficulty+'">'+{easy:'简单',medium:'中等',hard:'困难'}[t.difficulty]+'</span></div>';
}
html+='</div></div></div>';
html+='<div class="section-block"><div class="section-hd" onclick="toggleSection(this)"><span class="tag tag-purple">注意</span><h3>注意事项</h3><span class="arrow">▼</span></div><div class="section-body"><ul>';
for(var i=0;i<p.prevention.length;i++)html+='<li style="font-size:12px;color:#555;margin-bottom:6px;line-height:1.7">'+p.prevention[i]+'</li>';
html+='</ul></div></div>';
document.getElementById('page-part').innerHTML=html;
}

function toggleSection(el){
var body=el.nextElementSibling;
var isOpen=body.classList.contains('open');
body.classList.toggle('open');
el.classList.toggle('open',!isOpen);
}

renderHome();
</script>
</body>
</html>
