{title:"肩周炎",text:"<strong>判断方法：</strong>主动和被动外展、前屈、外旋均受限；夜间疼痛明显；三角肌止点压痛。<br><strong>自测：</strong>梳头试验阳性（无法完成摸对侧耳朵）。<br><strong>评估：</strong>肩关节活动度测量（前屈、外展、外旋、内旋）。",badge:[{t:"活动度受限",c:"warning"},{t:"夜间痛",c:"danger"}]},
{title:"肩袖损伤",text:"<strong>判断方法：</strong>主动外展无力；痛感弧试验阳性（在60°-120°外展时疼痛）；空罐试验阳性（冈上肌）。<br><strong>自测：</strong>冈上肌肌力测试——手臂外展90°、前屈30°、内旋，抵抗向下的力。<br><strong>评估：</strong>Drop arm test——手臂外展至90°，无法缓慢放下。",badge:[{t:"外展无力",c:"danger"},{t:"痛感弧",c:"warning"}]},
{title:"肩关节不稳",text:"<strong>判断方法：</strong>恐惧试验阳性（前屈、外展、外旋时疼痛和恐惧感）；Sulcus sign（牵拉时出现明显凹陷）。<br><strong>自测：</strong>肩关节前后松动感明显。",badge:[{t:"恐惧试验+",c:"danger"}]},
{title:"康复训练",text:"<div class='table'><tr><th>动作</th><th>目的</th><th>要点</th></tr><tr><td>钟摆运动</td><td>增加活动度</td><td>弯腰，手臂下垂，画圈，从小到大</td></tr><tr><td>爬墙练习</td><td>前屈外展</td><td>手指沿墙向上爬，每天记录高度</td></tr><tr><td>门框外旋</td><td>增加外旋</td><td>肘贴门框，前臂转动</td></tr><tr><td>弹力带外旋</td><td>肩袖肌力</td><td>弹力带固定，手臂外旋</td></tr><tr><td>冈上肌训练</td><td>肌力增强</td><td>手臂外展15°，抗阻上抬</td></tr></div>"},
{title:"预防措施",text:"• 避免突然用力提重物<br>• 运动前充分热身<br>• 加强肩袖肌群力量训练<br>• 注意肩关节保暖"}
]}
,{title:"肘关节",icon:"🦾",id:"elbow",subs:[

{title:"高尔夫球肘",text:"<strong>判断方法：</strong>肱骨内上髁压痛；屈腕抗阻时疼痛；触诊内侧肌腱附着点。<br><strong>自测：</strong>手腕抗阻屈曲时内上髁疼痛。",badge:[{t:"内上髁压痛",c:"danger"}]},
{title:"康复训练",text:"<strong>网球肘康复：</strong><br>• 离心训练：手腕放在桌边，手掌朝上，拿哑铃手腕缓慢下落再抬起<br>• 伸肌拉伸：手臂伸直，掌心朝下，另一手压下手背<br>• 握力练习：握球或握力器<br><br><strong>高尔夫球肘康复：</strong><br>• 屈腕离心训练<br>• 伸肌群拉伸<br>• 前臂筋膜松解"},
{title:"预防措施",text:"• 工作时保持手腕中立位<br>• 长时间使用鼠标时手腕垫支撑<br>• 定期做前臂肌群拉伸<br>• 避免过度握力训练"}
]}
,{title:"腕关节",icon:"✋",id:"wrist",subs:[

{title:"腕管综合征",text:"<strong>判断方法：</strong>正中神经分布区麻木（拇指、食指、中指、无名指桡侧）；Tinel's征阳性（敲击腕横韧带处麻电感）；Phalen's试验阳性（屈腕90°60秒后症状加重）。<br><strong>自测：</strong>双手背靠背屈腕30秒出现麻木。<br><strong>评估：</strong>神经传导速度检查。",badge:[{t:"正中神经麻木",c:"danger"},{t:"Tinel's征+",c:"danger"}]},
{title:"TFCC损伤",text:"<strong>判断方法：</strong>尺骨茎突远端压痛；尺腕应力试验阳性；旋前/旋后时疼痛。<br><strong>自测：</strong>腕关节尺偏时疼痛，前臂旋转痛。",badge:[{t:"尺偏疼痛",c:"warning"},{t:"旋转痛",c:"warning"}]},
{title:"康复训练",text:"<strong>腕管综合征：</strong>正中神经滑动练习（手臂伸直，依次屈伸手指和手腕）<br><br><strong>TFCC损伤：</strong>尺偏练习、前臂旋前旋后抗阻<br><br>• 握力训练：握球练习<br>• 腕关节活动度：画圈练习"},
{title:"预防措施",text:"• 使用键盘时手腕保持自然姿势<br>• 佩戴腕管综合征护具<br>• 避免手腕过度屈曲或伸展<br>• 工作间隙做手腕活动操"}
]}
,{title:"颈椎",icon:"🧠",id:"neck",subs:[
{title:"解剖",text:"颈椎由7个椎骨组成，C1-C2为寰枢关节，C3-C7为典型颈椎。包含椎间盘、钩椎关节、关节突关节、脊髓、神经根、椎动脉。"},
{title:"颈椎病",text:"<strong>判断方法：</strong>颈肩部疼痛、上肢放射痛或麻木；颈椎活动受限；神经根牵拉试验阳性（臂丛牵拉试验）；椎间孔挤压试验阳性。<br><strong>分型：</strong>神经根型（麻木疼痛）、脊髓型（四肢麻木、踩棉感）、椎动脉型（头晕）、交感神经型。<br><strong>自测：</strong>头部前屈、后仰、侧屈、旋转是否诱发症状。",badge:[{t:"上肢放射痛",c:"danger"},{t:"臂丛牵拉+",c:"danger"}]},
{title:"颈部肌肉劳损",text:"<strong>判断方法：</strong>颈肩部压痛；肌肉紧张僵硬；低头久坐后加重。<br><strong>自测：</strong>斜角肌、斜方肌上部压痛点。",badge:[{t:"肌肉紧张",c:"warning"},{t:"低头加重",c:"warning"}]},
{title:"康复训练",text:"• 颈部活动度练习：前屈、后仰、侧屈、旋转（每个方向10次）<br>• 颈部肌肉等长收缩：用手顶住头部，各方向抗阻6秒<br>• 肩胛骨收紧练习：挺胸收肩胛骨<br>• 麦肯基颈部伸展：仰卧抬头<br>• 姿势矫正：避免低头玩手机"},
{title:"预防措施",text:"• 保持正确坐姿（电脑屏幕与眼睛平齐）<br>• 避免低头玩手机（每15分钟活动颈椎）<br>• 使用合适的枕头（高度约为一拳）<br>• 定期做颈部肌肉放松按摩"}
]}
,{title:"胸椎",icon:"🫁",id:"thoracic",subs:[
{title:"解剖",text:"胸椎12个椎骨，与肋骨形成胸廓。活动度相对受限，主要参与躯干旋转和侧屈。"},
{title:"胸椎活动度受限",text:"<strong>判断方法：</strong>躯干旋转角度减小；胸椎节段性活动度下降；胸椎后凸角度增加。<br><strong>自测：</strong>坐位旋转时肩部与骨盆的关系（正常旋转约45°）。<br><strong>评估：</strong>胸椎活动度测量；Schobers测试。",badge:[{t:"旋转受限",c:"warning"},{t:"后凸增加",c:"warning"}]},
{title:"康复训练",text:"• 猫牛式：四点跪位交替脊柱屈伸<br>• 胸椎旋转练习：侧卧位旋转上侧胸椎<br>• 泡沫轴胸椎伸展：仰卧泡沫轴上<br>• 门框胸椎伸展：门框中做脊柱伸展<br>• 胸椎松动术"},
{title:"预防措施",text:"• 保持良好姿势（避免驼背）<br>• 长时间坐姿后起身活动<br>• 练习胸椎活动度<br>• 加强核心稳定训练"}
]}
,{title:"腰椎",icon:"�脊柱",id:"lumbar",subs:[
{title:"解剖",text:"腰椎5个椎骨，L4-L5、L5-S1椎间盘最易突出。包含椎体、椎间盘、关节突关节、黄韧带、硬膜囊、神经根。"},
{title:"腰椎间盘突出",text:"<strong>判断方法：</strong>腰痛伴下肢放射痛；直腿抬高试验阳性（仰卧抬腿<70°诱发疼痛）；股神经牵拉试验；神经根受压体征。<br><strong>自测：</strong>咳嗽、打喷嚏时疼痛加重；坐骨神经分布区麻木。<br><strong>评估：</strong>JOA评分、ODI功能障碍指数。",badge:[{t:"下肢放射痛",c:"danger"},{t:"直腿抬高+",c:"danger"}]},

{title:"康复训练",text:"<strong>麦肯基疗法：</strong><br>• 仰卧挺腹：仰卧抬臀，膝屈曲<br>• 俯卧撑起：俯卧用手撑起上半身<br>• 弓背练习：坐位弓背<br><br><strong>核心稳定训练：</strong><br>• Dead Bug：仰卧交替伸腿<br>• Bird Dog：四点跪位交替伸展对侧手脚<br>• 平板支撑<br>• 桥式练习"},
{title:"预防措施",text:"• 避免弯腰搬重物（屈髋屈膝）<br>• 保持正确坐姿（腰部支撑）<br>• 加强核心肌群训练<br>• 避免长时间久坐（每45分钟起身活动）"}
]}
,{title:"骨盆",icon:"🦴",id:"pelvis",subs:[
{title:"解剖",text:"骨盆由髂骨、坐骨、耻骨、骶骨、尾骨组成。包含骶髂关节、耻骨联合、髋关节（与股骨头形成）。"},
{title:"骨盆前倾",text:"<strong>判断方法：</strong>髂前上棘（ASIS）相对于耻骨联合更靠前；腰椎前凸增加；腹部前凸、臀部后翘。<br><strong>自测：</strong>靠墙站立，腰与墙的间隙——正常为1-2个手掌厚度；仰卧时腰椎贴床困难。",badge:[{t:"腰椎前凸↑",c:"danger"},{t:"ASIS前于耻骨",c:"danger"}]},

{title:"骶髂关节康复",text:"• 骶髂关节松动术<br>• 臀中肌训练：侧卧抬腿<br>• 核心稳定训练<br>• 髂腰肌拉伸"},
{title:"预防措施",text:"• 避免久坐（每45分钟活动）<br>• 加强臀部和核心肌群<br>• 注意站姿（重心均匀分布）<br>• 睡姿避免长期单侧"}
]}

let openParts=new Set(["shoulder","lumbar","pelvis"]);

function renderNav(){
 const nav=document.getElementById("navTabs");
 nav.innerHTML="";
 DATA.forEach(d=>{
  const btn=document.createElement("button");
  btn.textContent=(d.icon||"")+" "+d.title;
  btn.className=openParts.has(d.id)?"active":"";
  btn.onclick=()=>togglePart(d.id);
  nav.appendChild(btn);
 });
}

function renderContent(){
 const list=document.getElementById("contentList");
 list.innerHTML="";
 DATA.forEach(d=>{
  const part=document.createElement("div");
  part.className="part"+(openParts.has(d.id)?" open":"");
  part.id="part-"+d.id;
  let badgeStr="";
  if(openParts.has(d.id)){
   let subHtml="";
   d.subs.forEach(s=>{
    let badges="";
    if(s.badge){
     badges=s.badge.map(b=>`<span class="badge badge-${b.c}">${b.t}</span>`).join("");
    }
    subHtml+=`<div class="section"><h4>${s.title}${badges?"<br>"+badges:""}</h4>${s.text}</div>`;
   });
   part.innerHTML=`<header onclick="togglePart('${d.id}')"><h2>${d.icon||""} ${d.title}</h2><span>▼</span></header><div class="content">${subHtml}</div>`;
  }else{
   part.innerHTML=`<header onclick="togglePart('${d.id}')"><h2>${d.icon||""} ${d.title}</h2><span>▼</span></header>`;
  }
  list.appendChild(part);
 });
}

function togglePart(id){
 if(openParts.has(id)) openParts.delete(id);
 else openParts.add(id);
 renderNav();
 renderContent();
 if(document.querySelector(".search-box input").value) filterContent(document.querySelector(".search-box input").value);
}

function filterContent(q){
 if(!q.trim()){renderContent();return;}
 const list=document.getElementById("contentList");
 list.innerHTML="";
 DATA.forEach(d=>{
  let matchedSubs=[];
  d.subs.forEach(s=>{
   if(s.title.includes(q)||s.text.includes(q)) matchedSubs.push(s);
  });
  if(matchedSubs.length===0) return;
  const part=document.createElement("div");
  part.className="part open";
  let subHtml="";
  matchedSubs.forEach(s=>{
   let badges="";
   if(s.badge){
    badges=s.badge.map(b=>`<span class="badge badge-${b.c}">${b.t}</span>`).join("");
   }
   subHtml+=`<div class="section"><h4>${s.title}${badges?"<br>"+badges:""}</h4>${s.text}</div>`;
  });
  part.innerHTML=`<header onclick="togglePart('${d.id}')"><h2>${d.icon||""} ${d.title}</h2><span>▼</span></header><div class="content">${subHtml}</div>`;
  list.appendChild(part);
 });
 if(list.children.length===0){
  list.innerHTML='<div class="empty">没有找到相关内容</div>';
 }
}

renderNav();
renderContent();
</script>
