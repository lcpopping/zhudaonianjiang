function editNote(id){
var notes=ls.get('notes')||[];
var n=null;
for(var i=0;i<notes.length;i++){if(notes[i].id===id){n=notes[i];break;}}
if(!n){return;}
document.getElementById('noteModalTitle').textContent='编辑笔记';
document.getElementById('editNoteId').value=n.id;
document.getElementById('noteTitle').value=n.title;
document.getElementById('noteContent').value=n.content;
var allSubj=["语文","数学","英语","物理","化学","历史","地理","生物学","道德与法治","政治","信息技术"];
var sel=document.getElementById('noteSubj');
var opts='<option value="">无关联</option>';
for(var i=0;i<allSubj.length;i++){opts+='<option value="'+allSubj[i]+'"'+(allSubj[i]===n.subj?' selected':'')+'>'+allSubj[i]+'</option>';}
sel.innerHTML=opts;
document.getElementById('noteModal').classList.add('show');
}

function closeNoteModal(){document.getElementById('noteModal').classList.remove('show');document.getElementById('noteModal').className='modal';}

function saveNote(){
var title=document.getElementById('noteTitle').value.trim();
var content=document.getElementById('noteContent').value.trim();
if(!title){toast('请输入标题','error');return;}
var subj=document.getElementById('noteSubj').value;
var notes=ls.get('notes')||[];
var now=Date.now();
var editId=document.getElementById('editNoteId').value;
if(editId){
for(var i=0;i<notes.length;i++){if(notes[i].id==editId){notes[i]={id:editId,title:title,content:content,subj:subj,updated:now};break;}}
}else{
notes.unshift({id:now,title:title,content:content,subj:subj,created:now,updated:now});
}
ls.set('notes',notes);
closeNoteModal();
renderNotes();
toast('已保存','success');
}

function delNote(id){
if(!confirm('确定删除？')){return;}
var notes=ls.get('notes')||[];
var filtered=[];
for(var i=0;i<notes.length;i++){if(notes[i].id!==id){filtered.push(notes[i]);}}
ls.set('notes',filtered);
renderNotes();
toast('已删除');
}

maps.push({id:id,name:name,nodes:[{id:1,x:180,y:150,text:'中心主题',root:true}],lines:[]});
ls.set('maps',maps);
closeMapModal();
toast('导图已创建','success');
loadMap(id);
}

function loadMap(id){
if(!id){document.getElementById('mapCanvas').innerHTML='<div class="empty" style="padding:60px;text-align:center;color:#aaa">请新建或加载导图</div>';return;}
var maps=ls.get('maps')||[];
var m=null;
for(var i=0;i<maps.length;i++){if(maps[i].id==id){m=maps[i];break;}}
if(!m){return;}
var canvas=document.getElementById('mapCanvas');
canvas.innerHTML='';
for(var i=0;i<(m.lines||[]).length;i++){
var l=m.lines[i];
var f=null,t2=null;
for(var j=0;j<(m.nodes||[]).length;j++){if(m.nodes[j].id===l.from){f=m.nodes[j];}if(m.nodes[j].id===l.to){t2=m.nodes[j];}}
if(f&&t2){
var a=Math.atan2(t2.y-f.y,t2.x-f.x);
var dist=Math.sqrt(Math.pow(t2.x-f.x,2)+Math.pow(t2.y-f.y,2));
var line=document.createElement('div');
line.style.cssText='position:absolute;left:'+(f.x+40)+'px;top:'+(f.y+20)+'px;width:'+dist+'px;height:2px;background:#3182ce;transform-origin:left center;transform:rotate('+a+'rad)';
canvas.appendChild(line);
}
}
for(var i=0;i<(m.nodes||[]).length;i++){
var n=m.nodes[i];
var node=document.createElement('div');
node.style.cssText='position:absolute;left:'+n.x+'px;top:'+n.y+'px;padding:8px 14px;background:'+(n.root?'#2d6a4f':'#ebf8ff')+';color:'+(n.root?'#fff':'#1b4332')+';border-radius:8px;border:2px solid '+(n.root?'#2d6a4f':'#3182ce')+';cursor:move;min-width:80px;text-align:center;font-size:12px;user-select:none';
node.textContent=n.text;
node.dataset.id=n.id;
node.onmousedown=function(e){window._dragNode=Number(this.dataset.id);window._dragOffX=e.offsetX;window._dragOffY=e.offsetY;};
node.onclick=function(){window._selNode=Number(this.dataset.id);};
canvas.appendChild(node);
}
canvas.onmousemove=function(e){
if(!window._dragNode){return;}
var rect=canvas.getBoundingClientRect();
var x=e.clientX-rect.left-window._dragOffX;
var y=e.clientY-rect.top-window._dragOffY;
var nodes2=(ls.get('maps')||[]).find(function(m2){return m2.nodes.some(function(n){return n.id===window._dragNode;});})||{nodes:[]};
for(var i=0;i<nodes2.nodes.length;i++){if(nodes2.nodes[i].id===window._dragNode){nodes2.nodes[i].x=x;nodes2.nodes[i].y=y;break;}}
};
canvas.onmouseup=function(){
if(window._dragNode){
var maps2=ls.get('maps')||[];
var map2=null;
for(var i=0;i<maps2.length;i++){if(maps2[i].id==document.getElementById('mapSel').value){map2=maps2[i];break;}}
if(map2){
for(var i=0;i<map2.nodes.length;i++){if(map2.nodes[i].id===window._dragNode){map2.nodes[i].x=parseFloat(canvas.querySelector('[data-id="'+window._dragNode+'"]').style.left);map2.nodes[i].y=parseFloat(canvas.querySelector('[data-id="'+window._dragNode+'"]').style.top);break;}}
ls.set('maps',maps2);
}
window._dragNode=null;
}
};
canvas.ondblclick=function(e){
if(e.target===canvas){return;}
var nid=Number(e.target.dataset.id);
if(!nid){return;}
var txt=prompt('节点内容：',e.target.textContent);
if(txt){
var maps3=ls.get('maps')||[];
var map3=null;
for(var i=0;i<maps3.length;i++){if(document.getElementById('mapSel')&&maps3[i].id==document.getElementById('mapSel').value){map3=maps3[i];break;}}
if(map3){
for(var i=0;i<map3.nodes.length;i++){if(map3.nodes[i].id===nid){map3.nodes[i].text=txt;break;}}
ls.set('maps',maps3);
}
e.target.textContent=txt;
}
};
canvas.onclick=function(e){
if(e.target===canvas){window._selNode=null;}
};
}

function renderReview(){
var reviews=ls.get('reviews')||[];
var today=new Date();today.setHours(0,0,0,0);
var due=[];
var pastDue=[];
var mastered=[];
for(var i=0;i<reviews.length;i++){
var r=reviews[i];
var d=new Date(r.nextReview);d.setHours(0,0,0,0);
if(r.mastered){mastered.push(r);}
else if(d.getTime()===today.getTime()){due.push(r);}
else if(d<today){pastDue.push(r);}
}
document.getElementById('page-review').innerHTML='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
'<div class="card" style="flex:1;min-width:100px;text-align:center;padding:12px"><div style="font-size:24px;font-weight:700;color:#3182ce">'+reviews.length+'</div><div style="font-size:11px;color:#888">总计</div></div>'+
'<div class="card" style="flex:1;min-width:100px;text-align:center;padding:12px"><div style="font-size:24px;font-weight:700;color:#f59e0b">'+(due.length+pastDue.length)+'</div><div style="font-size:11px;color:#888">待复习</div></div>'+
'<div class="card" style="flex:1;min-width:100px;text-align:center;padding:12px"><div style="font-size:24px;font-weight:700;color:#38a169">'+mastered.length+'</div><div style="font-size:11px;color:#888">已掌握</div></div>'+
'<button class="btn btn-primary" onclick="showRevModal()">➕ 添加复习项</button></div>'+
'<div class="card"><div class="card-title">⏰ 待复习</div>'+(due.concat(pastDue).map(function(r){return'<div style="padding:10px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center"><div><strong style="font-size:13px">'+r.title+'</strong><div style="font-size:11px;color:#888">'+(r.subj?'['+r.subj+'] ':'')+'间隔'+r.interval+'天</div></div><button class="btn btn-success btn-sm" onclick="markDone('+r.id+')">✓ 完成</button></div>';}).join('')||'<div style="padding:20px;text-align:center;color:#aaa;font-size:12px">暂无待复习内容</div>')+'</div>';
}

function showRevModal(subjName){
var allSubj=["语文","数学","英语","物理","化学","历史","地理","生物学","道德与法治","政治","信息技术"];
var sel=document.getElementById('revSubj');
var opts='<option value="">无关联</option>';
for(var i=0;i<allSubj.length;i++){opts+='<option value="'+allSubj[i]+'">'+allSubj[i]+'</option>';}
sel.innerHTML=opts;
if(subjName){document.getElementById('revSubj').value=subjName;}
document.getElementById('revTitle').value='';
document.getElementById('revInterval').value='7';
document.getElementById('revModal').classList.add('show');
}

function closeRevModal(){document.getElementById('revModal').classList.remove('show');document.getElementById('revModal').className='modal';}

function saveRev(){
var title=document.getElementById('revTitle').value.trim();
if(!title){toast('请输入内容','error');return;}
var subj=document.getElementById('revSubj').value;
var interval=parseInt(document.getElementById('revInterval').value);
var now=new Date();
var reviews=ls.get('reviews')||[];
reviews.unshift({id:Date.now(),title:title,subj:subj,interval:interval,nextReview:new Date(now.getTime()+interval*86400000).toISOString(),created:now.getTime(),mastered:false,history:[]});
ls.set('reviews',reviews);
closeRevModal();
renderReview();
toast('已添加','success');
}

function markDone(id){
var reviews=ls.get('reviews')||[];
var idx=-1;
for(var i=0;i<reviews.length;i++){if(reviews[i].id===id){idx=i;break;}}
if(idx===-1){return;}
var r=reviews[idx];
r.history=r.history||[];
r.history.push(new Date().toISOString());
if(r.history.length>=3){r.mastered=true;toast('🎉 已掌握！','success');}
else{var next=new Date();next.setDate(next.getDate()+r.interval*(r.history.length+1));r.nextReview=next.toISOString();toast('下次复习：'+new Date(r.nextReview).toLocaleDateString());}
reviews[idx]=r;
ls.set('reviews',reviews);
renderReview();
}

renderHome();
</script>
