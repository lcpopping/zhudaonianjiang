"语文-小学":[
{title:"汉语拼音",tag:"yy",tagName:"语文",desc:"声母、韵母、整体认读音节",
content:"<h3>一、声母（23个）</h3><p>唇音：b p m f</p><p>舌尖音：d t n l</p><p>舌根音：g k h</p><p>舌面音：j q x</p><p>舌尖后音：zh ch sh r</p><p>舌尖前音：z c s</p><div class='highlight'>记忆口诀：b像广播，p像红旗，m像两扇门，f像拐棍。</div><h3>二、韵母（24个）</h3><p>单韵母（6个）：a o e i u ü</p><p>复韵母（9个）：ai ei ui ao ou iu ie üe er</p><p>鼻韵母（9个）：an en in un ün ang eng ing ong</p><h3>三、整体认读音节（16个）</h3><p>zhi chi shi ri zi ci si yi wu yu ye yue yuan yin yun</p><div class='example'>例：zhī（知）、chī（吃）、shī（师）、rì（日）</div>"},
{title:"识字写字",tag:"yy",tagName:"语文",desc:"象形字、形声字、形近字",
content:"<h3>一、象形字</h3><p>日、月、水、火 → 像实物形状</p><p>山、石、田、木 → 模拟自然事物</p><div class='example'>口（嘴巴）、目（眼睛）、手（手掌）</div><h3>二、形声字</h3><p>形旁（表意）+ 声旁（表音）</p><p>清（氵+青）→ 与水相关</p><p>晴（日+青）→ 与太阳相关</p><p>河（氵+可）→ 与水相关</p><h3>三、形近字</h3><p>已/己：已（已经）、己（自己）</p><p>末/未：末（末尾）、未（没有）</p><p>木/本：木（树木）、本（书本）</p>"},
{title:"阅读理解",tag:"yy",tagName:"语文",desc:"找中心句、理解词语、段落大意",
content:"<h3>一、找中心句</h3><p>中心句通常在：</p><ul><li>段落开头（总起句）</li><li>段落结尾（总结句）</li><li>段落中间（承上启下）</li></ul><h3>二、理解词语</h3><p>方法：联系上下文、拆字理解、近义词替换</p><div class='example'>例：五彩缤纷 → 五种颜色丰富多彩，形容色彩鲜艳</div><h3>三、概括段意</h3><p>摘句法：直接用段落中的重点句子</p><p>取舍法：抓住主要内容，舍去次要</p><p>合并法：把几层意思合并起来</p>"},
{title:"写作基础",tag:"yy",tagName:"语文",desc:"看图写话、记叙文要素",
content:"<h3>一、看图写话</h3><p>四要素：时间、地点、人物、事情</p><p>观察顺序：从上到下、从远到近</p><div class='example'>今天（时间），小红和妈妈在公园（地点）放风筝（事情）。</div><h3>二、记叙文六要素</h3><p>时间、地点、人物、起因、经过、结果</p><h3>三、写作步骤</h3><p>审题 → 立意 → 选材 → 写作 → 修改</p>"}
],

{title:"20以内加减法",tag:"sx",tagName:"数学",desc:"凑十法、破十法、进位退位",
content:"<h3>一、凑十法（加法）</h3><p>看大数，拆小数，凑成十，算得数</p><div class='formula'>8 + 5 = 8 + 2 + 3 = 13</div><div class='example'>凑十歌：一九一九好朋友，二八二八手拉手，三七三七真亲密，四六四六一起走，五五凑成一双手。</div><h3>二、破十法（减法）</h3><p>看大数，分出十，减小数，加剩数</p><div class='formula'>15 - 8 = 10 - 8 + 5 = 7</div><h3>三、竖式计算</h3><p>相同数位对齐，从个位算起</p><p>加法：满十进一</p><p>减法：不够减借一当十</p>"},
{title:"认识图形",tag:"sx",tagName:"数学",desc:"平面图形、立体图形",
content:"<h3>一、平面图形</h3><p>正方形：4条边相等，4个角都是直角</p><p>长方形：2条长、2条宽，对边相等</p><p>三角形：3条边、3个角</p><p>圆形：没有角，边缘光滑</p><h3>二、立体图形</h3><p>长方体：6个面，相对的面相等</p><p>正方体：6个面，都相等</p><p>球：没有平面，可以滚动</p><p>圆柱：上下两个圆面</p><h3>三、特征对比</h3><div class='highlight'>正方形：4边等、4直角 | 长方形：对边等、4直角 | 三角形：3边3角</div>"},
{title:"认识人民币",tag:"sx",tagName:"数学",desc:"元角分、换算、购物",
content:"<h3>一、人民币单位</h3><p>元、角、分</p><p>1元 = 10角 = 100分</p><p>1角 = 10分</p><h3>二、换算</h3><div class='formula'>5元 = 50角 = 500分</div><div class='formula'>3元5角 = 35角 = 350分</div><h3>三、购物计算</h3><p>同单位相加减</p><div class='example'>小明买了2元5角的铅笔和1元3角的橡皮，一共花了 2元5角 + 1元3角 = 3元8角</div>"},
{title:"乘法初步",tag:"sx",tagName:"数学",desc:"乘法口诀、乘除法意义",
content:"<h3>一、乘法意义</h3><p>求几个相同加数的和的简便运算</p><div class='formula'>3 × 4 = 4 + 4 + 4 = 12</div><h3>二、乘法口诀</h3><p>熟记1-9的乘法口诀</p><div class='example'>一一得一 | 一二得二... | 二二得四 | 二三得六... | 九九八十一</div><h3>三、乘除法关系</h3><p>乘法：3 × 4 = 12</p><p>除法：12 ÷ 3 = 4 或 12 ÷ 4 = 3</p><p>被除数 ÷ 除数 = 商</p>"}
],
"英语-小学":[
{title:"26个字母",tag:"yy2",tagName:"英语",desc:"字母分类、书写、发音",

{title:"基础词汇",tag:"yy2",tagName:"英语",desc:"颜色、数字、家庭、动物",
content:"<h3>一、颜色（Colors）</h3><p>red红色 | blue蓝色 | green绿色 | yellow黄色 | orange橙色 | purple紫色 | white白色 | black黑色</p><h3>二、数字（Numbers）</h3><p>one/two/three/four/five | six/seven/eight/nine/ten</p><p>eleven十二 | twelve十二 | twenty二十</p><h3>三、家庭（Family）</h3><p>father/mother | brother/sister | grandfather/grandmother</p><h3>四、动物（Animals）</h3><p>cat猫 | dog狗 | bird鸟 | fish鱼 | rabbit兔子 | panda熊猫</p>"},
{title:"日常用语",tag:"yy2",tagName:"英语",desc:"问候、介绍、感谢",
content:"<h3>一、问候（Greetings）</h3><p>Hello! / Hi! 你好！</p><p>Good morning! 早上好！</p><p>Good afternoon! 下午好！</p><p>Good evening! 晚上好！</p><p>Goodbye! / Bye! 再见！</p><h3>二、自我介绍</h3><p>What's your name? 你叫什么名字？</p><p>My name is... 我叫...</p><p>How are you? 你好吗？</p><p>I'm fine, thank you. 我很好，谢谢。</p><h3>三、感谢与道歉</h3><p>Thank you! / Thanks! 谢谢！</p><p>Sorry! 对不起！</p>"}

{title:"字词积累",tag:"yy",tagName:"语文",desc:"多音字、同义词、成语典故",
content:"<h3>一、多音字辨析</h3><div class='formula'>行 xíng（行走）/ háng（银行）</div><div class='formula'>长 zhǎng（长大）/ cháng（长短）</div><div class='formula'>为 wèi（因为）/ wéi（行为）</div><div class='formula'>朝 zhāo（朝霞）/ cháo（朝向）</div><h3>二、同义词辨析</h3><p>勉励vs鼓励：勉励多用于上对下，鼓励可用于平辈</p><p>精密vs细致：精密侧重精确，细致侧重精细</p><p>愤怒vs愤慨：愤怒程度更深</p><h3>三、成语典故</h3><p>守株待兔：比喻死守狭隘经验</p><p>画蛇添足：比喻多做无用功</p><p>亡羊补牢：比喻出了问题后想办法补救</p>"},
{title:"语法基础",tag:"yy",tagName:"语文",desc:"词性、短语、句子成分",
content:"<h3>一、词性</h3><p><b>实词：</b>名词、动词、形容词、数词、量词、代词</p><p><b>虚词：</b>副词、介词、连词、助词、叹词</p><h3>二、短语类型</h3><p>主谓短语：天气好（名+形）</p><p>动宾短语：吃饭（动+名）</p><p>偏正短语：美丽花园（形+名）</p><p>并列短语：爸爸妈妈（名+名）</p><h3>三、单句成分</h3><p>主语 + 谓语 + 宾语</p><p>定语 + 主语 + 状语 + 谓语 + 补语 + 定语 + 宾语</p>"},
{title:"阅读理解",tag:"yy",tagName:"语文",desc:"记叙文、说明文、议论文",
content:"<h3>一、记叙文</h3><p><b>六要素：</b>时间、地点、人物、起因、经过、结果</p><p><b>叙述顺序：</b>顺叙、倒叙、插叙</p><p><b>修辞手法：</b>比喻、拟人、排比、夸张</p><h3>二、说明文</h3><p><b>说明方法：</b>举例子、列数字、作比较、打比方</p><p><b>说明顺序：</b>时间顺序、空间顺序、逻辑顺序</p><h3>三、议论文</h3><p><b>三要素：</b>论点、论据、论证</p><p><b>论证方法：</b>举例论证、道理论证、对比论证、比喻论证</p>"},
{title:"文言文入门",tag:"yy",tagName:"语文",desc:"实词、虚词、古今异义",
content:"<h3>一、重点实词</h3><p>之（的/去/它）、其（他的/其中）、以（因为/用来）、于（在/比）</p><p>而（但是/并且）、则（就/却）、乃（于是/竟然）、且（而且/尚且）</p><h3>二、虚词用法</h3><div class='highlight'>而：表转折（然而）、表递进（而且）、表承接（然后）</div><div class='highlight'>则：表承接（则...）、表转折（则...）</div><h3>三、古今异义</h3><p>妻子（古：妻和子 → 今：妻子的配偶）</p><p>卑鄙（古：地位低微 → 今：品质恶劣）</p><p>虽然（古：虽然这样 → 今：转折连词）</p>"},
{title:"写作训练",tag:"yy",tagName:"语文",desc:"审题、立意、结构",
content:"<h3>一、审题方法</h3><p>看题目要求、看清题材、看清字数</p><p>找关键词、找限制词</p><h3>二、立意原则</h3><p>深刻：透过现象看本质</p><p>新颖：独特视角、个人体验</p><p>准确：符合题意、积极健康</p><h3>三、结构安排</h3><p><b>起承转合：</b>开头、承接、发展、结尾</p><p><b>层层深入：</b>现象→原因→本质→做法</p><p><b>正反对比：</b>正面例子→反面例子→总结观点</p>"}
],
"数学-初中":[
{title:"有理数与整式",tag:"sx",tagName:"数学",desc:"数轴、相反数、绝对值、整式",
content:"<h3>一、有理数分类</h3><p>整数：正整数、0、负整数</p><p>分数：正分数、负分数</p><h3>二、数轴三要素</h3><p>原点、正方向、单位长度</p><div class='highlight'>数轴上的点与有理数一一对应</div><h3>三、相反数与绝对值</h3><div class='formula'>相反数：a的相反数是-a | 性质：a + (-a) = 0</div><div class='formula'>绝对值：|a| = a（a≥0）；|a| = -a（a<0）</div><h3>四、整式</h3><p>单项式：数与字母的积</p><p>多项式：几个单项式的和</p><p>同类项：所含字母相同，相同字母指数也相同</p>"},
{title:"一元一次方程",tag:"sx",tagName:"数学",desc:"等式性质、解方程、应用题",
content:"<h3>一、等式性质</h3><p>性质1：两边同时加（或减）同一个数，等式仍成立</p><p>性质2：两边同时乘（或除以）同一个数（不为0），等式仍成立</p><h3>二、解方程步骤</h3><p>去括号 → 移项 → 合并同类项 → 系数化为1</p><div class='example'>3(x-2) + 1 = x - (2x-3)</div><div class='formula'>解：3x - 6 + 1 = x - 2x + 3</div><div class='formula'>3x - 5 = -x + 3</div><div class='formula'>3x + x = 3 + 5 → 4x = 8 → x = 2</div><h3>三、应用题类型</h3><p>行程问题：路程 = 速度 × 时间</p><p>工程问题：工作总量 = 效率 × 时间</p><p>利润问题：利润 = 售价 - 进价</p>"},
{title:"几何图形",tag:"sx",tagName:"数学",desc:"相交线、平行线、三角形、四边形",
content:"<h3>一、相交线与平行线</h3><p><b>对顶角相等</b></p><p><b>同位角相等</b>、<b>内错角相等</b></p><div class='highlight'>平行线判定：同位角相等→两直线平行</div><h3>二、三角形</h3><p>内角和：180°</p><p><b>全等三角形判定：</b>SAS、ASA、SSS、AAS</p><div class='formula'>SAS：两边及其夹角相等 | ASA：两角及其夹边相等</div><h3>三、四边形</h3><p>平行四边形：两组对边平行</p><p>矩形：四个角都是直角</p><p>菱形：四条边相等</p><p>正方形：四边等、四角直</p>"},
{title:"函数初步",tag:"sx",tagName:"数学",desc:"坐标系、一次函数、正比例函数",
content:"<h3>一、平面直角坐标系</h3><p>X轴（横轴）、Y轴（纵轴）</p><p>原点O（0,0）</p><p>四个象限：I（+,+）、II（-,+）、III（-,-）、IV(+,-)</p><h3>二、坐标表示</h3><p>点P的坐标：(x, y)</p><p>x表示横坐标，y表示纵坐标</p><h3>三、一次函数</h3><div class='formula'>y = kx + b（k≠0）</div><p>k > 0：直线过一二三象限</p><p>k < 0：直线过二三四象限</p><p>b > 0：与y轴交于正半轴</p><h3>四、正比例函数</h3><div class='formula'>y = kx（k≠0，b=0）</div><p>图像经过原点</p>"},
{title:"统计与概率",tag:"sx",tagName:"数学",desc:"统计量、普查抽样、概率计算",
content:"<h3>一、统计量</h3><p><b>平均数：</b>所有数据之和÷数据个数</p><p><b>中位数：</b>将数据排序后位于中间的值</p><p><b>众数：</b>出现次数最多的数据</p><h3>二、普查与抽样调查</h3><p>普查：对全体对象进行调查</p><p>抽样调查：从总体中抽取部分进行调查</p><div class='highlight'>抽样调查要求：随机性、代表性、样本容量足够大</div><h3>三、概率</h3><div class='formula'>P(A) = 满足条件的结果数 / 所有可能的结果数</div><p>必然事件：P = 1</p><p>不可能事件：P = 0</p><p>随机事件：0 < P < 1</p>"}
],
"英语-初中":[
{title:"词汇积累",tag:"yy2",tagName:"英语",desc:"词性转换、词根词缀、短语动词",
content:"<h3>一、词性转换</h3><p>quick（adj）→ quickly（adv）→ quickness（n）</p><p>happy（adj）→ happily（adv）→ happiness（n）</p><p>die（v）→ dead（adj）→ death（n）</p><p>beauty（n）→ beautiful（adj）→ beautifully（adv）</p><h3>二、词根词缀</h3><p>un-（否定）：unhappy、unfair、undo</p><p>re-（重复）：rewrite、rebuild、return</p><p>-tion（名词后缀）：education、relation</p><p>-ly（副词后缀）：carefully、quickly</p><h3>三、短语动词</h3><p>take：take off（起飞）、take up（占据）、take care of（照顾）</p><p>put：put off（推迟）、put away（放好）、put out（熄灭）</p><p>get：get up（起床）、get along with（相处）</p>"},
{title:"时态系统",tag:"yy2",tagName:"英语",desc:"现在时、过去时、将来时",
content:"<h3>一、一般现在时</h3><p>结构：主语 + 动词原形（主三单加s/es）</p><p>用法：习惯经常、客观事实、普遍真理</p><div class='example'>He plays football every day. | Water boils at 100°C.</div><h3>二、现在进行时</h3><p>结构：be + V-ing</p><p>用法：正在进行的动作</p><div class='example'>She is reading a book now.</div><h3>三、一般过去时</h3><p>结构：主语 + 动词过去式</p><p>标志词：yesterday、last week、ago、in 2020</p><div class='example'>They visited Beijing last year.</div><h3>四、一般将来时</h3><p>结构：will + 动词原形 / be going to + 动词原形</p><div class='example'>I will go to school tomorrow. | She is going to study English.</div>"},
{title:"从句",tag:"yy2",tagName:"英语",desc:"宾语从句、状语从句、定语从句",
content:"<h3>一、宾语从句</h3><p>结构：主句 + 连接词 + 从句</p><p>连接词：that（无含义）、if/whether（是否）、what/who/where...</p><div class='example'>I think that he is right. | Can you tell me where he lives?</div><h3>二、状语从句</h3><p>时间：when/while/as（当...时）、before/after、since</p><p>条件：if/unless（除非）</p><p>原因：because、since、as</p><p>让步：although/though（虽然）、even if</p><div class='example'>I will call you when I arrive. | If it rains, I will stay home.</div><h3>三、定语从句</h3><p>关系代词：who（指人）、which（指物）、that（人/物）</p><div class='example'>The boy who is playing football is my brother.</div>"}
],
"物理-初中":[
{title:"声与光",tag:"wl",tagName:"物理",desc:"声音、光的传播、反射折射",
content:"<h3>一、声音的产生与传播</h3><p>声音由物体振动产生</p><p>声音的传播需要介质（固体、液体、气体）</p><p>真空不能传声</p><div class='formula'>声音在15°C空气中传播速度：340 m/s</div><h3>二、声音三要素</h3><p><b>音调：</b>声音的高低（由频率决定）</p><p><b>响度：</b>声音的强弱（由振幅决定）</p><p><b>音色：</b>声音的特色（由发声体决定）</p><h3>三、光的传播</h3><p>光在同种均匀介质中沿直线传播</p><p>光速：3×10⁸ m/s</p><h3>四、光的反射与折射</h3><p>反射定律：反射角 = 入射角</p><div class='formula'>折射规律：光从空气斜射入水/玻璃时，折射角 < 入射角</div>"},
{title:"力与运动",tag:"wl",tagName:"物理",desc:"重力、弹力、摩擦力、二力平衡",
content:"<h3>一、力的作用效果</h3><p>改变物体的运动状态</p><p>使物体发生形变</p><h3>二、重力</h3><div class='formula'>G = mg（g = 9.8 N/kg）</div><p>重力的方向：竖直向下</p><h3>三、弹力与摩擦力</h3><p>弹力：物体发生弹性形变产生的力</p><p>摩擦力：f = μN（μ为摩擦系数）</p><p>滑动摩擦、静摩擦、滚动摩擦</p><h3>四、二力平衡</h3><p><b>条件：</b>同物、同线、反向、等大</p><div class='highlight'>平衡力与相互作用力的区别：平衡力作用在同一物体上，相互作用力作用在两个不同物体上</div>"},
{title:"压强浮力",tag:"wl",tagName:"物理",desc:"固体液体压强、大气压、浮力",
content:"<h3>一、固体压强</h3><div class='formula'>p = F/S（压力 ÷ 受力面积）</div><p>压力越大、受力面积越小，压强越大</p><h3>二、液体压强</h3><div class='formula'>p = ρgh（ρ为液体密度，h为深度）</div><p>液体压强只与密度和深度有关</p><h3>三、大气压强</h3><p>马德堡半球实验证明了大气压的存在</p><p>托里拆利实验测出了大气压的值</p><div class='formula'>标准大气压：1.01×10⁵ Pa</div><h3>四、浮力</h3><div class='formula'>F浮 = G排 = ρ液gV排</div><p><b>阿基米德原理：</b>浮力等于物体排开液体的重力</p>"},
{title:"电学基础",tag:"wl",tagName:"物理",desc:"电流电压、电阻、欧姆定律",
content:"<h3>一、电流</h3><p>电荷的定向移动形成电流</p><p>电流方向：正电荷移动方向（或负电荷移动反方向）</p><div class='formula'>I = Q/t（电流 = 电荷量 / 时间）</div><p>单位：安培（A）</p><h3>二、电压</h3><p>电压是使电荷定向移动形成电流的原因</p><p>单位：伏特（V）</p><h3>三、电阻</h3><div class='formula'>R = U/I（电阻 = 电压 / 电流）</div><p>电阻大小与材料、长度、横截面积、温度有关</p><h3>四、欧姆定律</h3><div class='formula'>I = U/R</div><p>电流与电压成正比，与电阻成反比</p>"}
],
"化学-初中":[
{title:"物质构成",tag:"hx",tagName:"化学",desc:"分子原子、元素、化学式",
content:"<h3>一、分子与原子</h3><p><b>分子：</b>保持物质化学性质的最小粒子</p><p><b>原子：</b>化学变化中的最小粒子</p><p>分子由原子构成</p><h3>二、原子结构</h3><p>原子核（质子+中子）+ 核外电子</p><p>质子数 = 核电荷数 = 核外电子数（原子）</p><div class='highlight'>在化学反应中，原子核不变，只有核外电子转移</div><h3>三、元素</h3><p>具有相同核电荷数的一类原子的总称</p><p>元素符号：H He Li Be B C N O F Ne...</p><h3>四、化学式</h3><p>用元素符号和数字表示物质组成的式子</p><p>H₂O表示一个水分子含2个氢原子和1个氧原子</p>"},
{title:"化学用语",tag:"hx",tagName:"化学",desc:"化合价、化学方程式、配平",
content:"<h3>一、化合价</h3><div class='formula'>一价氢氯钾钠银 | 二价氧钙钡镁锌</div><div class='formula'>三铝四硅五价磷 | 二三铁、二四碳</div><div class='highlight'>化合物中化合价代数和为零</div><h3>二、化学方程式</h3><p>书写原则：以客观事实为依据，遵循质量守恒定律</p><p>配平方法：最小公倍数法、奇数配偶法</p><h3>三、质量守恒定律</h3><p>化学反应前后：</p><ul><li>物质总质量不变</li><li>原子种类不变</li><li>原子数目不变</li><li>原子质量不变</li></ul>"},
{title:"空气氧气",tag:"hx",tagName:"化学",desc:"空气成分、氧气性质、燃烧条件",
content:"<h3>一、空气成分</h3><p>氮气78% | 氧气21% | 稀有气体0.94% | 二氧化碳0.03%</p><h3>二、氧气性质</h3><p>无色无味气体，不易溶于水</p><p>支持燃烧，供给呼吸</p><h3>三、燃烧条件</h3><p>达到着火点</p><p>与氧气接触</p><div class='highlight'>灭火原理：破坏任一条件（隔绝空气或降低温度至着火点以下）</div><h3>四、实验室制氧气</h3><p>过氧化氢分解：2H₂O₂ → 2H₂O + O₂↑（二氧化锰催化）</p><p>加热高锰酸钾：2KMnO₄ → K₂MnO₄ + MnO₂ + O₂↑</p>"},
{title:"溶液",tag:"hx",tagName:"化学",desc:"溶解度、浓度计算",
content:"<h3>一、溶液组成</h3><p><b>溶质：</b>被溶解的物质</p><p><b>溶剂：</b>能溶解其他物质的物质（水是最常见溶剂）</p><h3>二、溶解度</h3><div class='formula'>溶解度 = (饱和时溶质质量 / 100g溶剂) × 100g</div><p>影响因素：温度（固体）、压强（气体）</p><h3>三、浓度</h3><div class='formula'>质量分数 = (溶质质量 / 溶液质量) × 100%</div><div class='example'>20g盐溶解在80g水中，溶液质量分数 = 20/(20+80) × 100% = 20%</div>"},
{title:"酸碱盐",tag:"hx",tagName:"化学",desc:"酸碱指示剂、通性、复分解反应",
content:"<h3>一、酸碱指示剂</h3><p>紫色石蕊：酸红碱蓝</p><p>酚酞：碱红酸无色</p><h3>二酸的通性</h3><p>与指示剂反应</p><p>与活泼金属反应：Fe + 2HCl → FeCl₂ + H₂↑</p><p>与碱反应：HCl + NaOH → NaCl + H₂O</p><p>与盐反应：2HCl + Na₂CO₃ → 2NaCl + H₂O + CO₂↑</p><h3>三、碱的通性</h3><p>与指示剂反应</p><p>与非金属氧化物反应：2NaOH + CO₂ → Na₂CO₃ + H₂O</p><p>与酸反应（中和反应）</p><h3>四、复分解反应</h3><p>AB + CD → AD + CB</p><p>条件：生成物中有沉淀、气体或水</p>"}
],
"语文-高中":[
{title:"现代文阅读",tag:"yy",tagName:"语文",desc:"小说、散文、论述文阅读技巧",
content:"<h3>一、小说阅读</h3><p><b>三要素：</b>人物、情节、环境</p><p><b>人物塑造方法：</b>语言描写、动作描写、心理描写、神态描写、外貌描写</p><p><b>情节推进：</b>开端、发展、高潮、结局</p><h3>二、散文阅读</h3><p><b>特点：</b>形散神聚</p><p><b>表现手法：</b>托物言志、借景抒情、动静结合、虚实相生</p><h3>三、论述文阅读</h3><p><b>三要素：</b>论点（观点）、论据（材料）、论证（方法）</p><p><b>论证方法：</b>举例论证、道理论证、对比论证、比喻论证、引用论证</p>"},
{title:"文言文精讲",tag:"yy",tagName:"语文",desc:"实词虚词、词类活用、翻译技巧",
content:"<h3>一、重点实词（120个）</h3><p>之、其、以、于、而、则、乃、且、所、为、者、而、于、以、因</p><h3>二、虚词用法</h3><div class='highlight'>而：表转折（然而）、表递进（而且）、表修饰（地）</div><div class='highlight'>以：表原因（因为）、表方式（用来）、表时间（在）</div><h3>三、词类活用</h3><p><b>名词作动词：</b>假舟楫者，非能水也（游水）</p><p><b>名词作状语：</b>有狼恒入口（从口里）</p><p><b>意动用法：</b>孔子登东山而小鲁（认为...小）</p><p><b>使动用法：</b>可烧而走也（使...败退）</p><h3>四、翻译技巧</h3><p>留（人名地名）、换（古今异义）、补（省略成分）、删（无意义虚词）</p>"},
{title:"古诗文鉴赏",tag:"yy",tagName:"语文",desc:"表达技巧、意象分析、情感主旨",
content:"<h3>一、表达技巧</h3><p><b>修辞手法：</b>比喻、拟人、夸张、对偶、排比、互文</p><p><b>表现手法：</b>借景抒情、托物言志、对比反衬、卒章显志、埋伏笔</p><h3>二、常见意象</h3><p><b>思乡：</b>月亮、鸿雁、捣衣</p><p><b>离别：</b>折柳、长亭、南浦</p><p><b>高洁：</b>梅花、菊花、莲花、松柏</p><p><b>战争：</b>烽火、硝烟、将军、长城</p><h3>三、情感主旨</h3><p>忧国忧民 | 建功立业 | 寄情山水 | 羁旅思乡</p><p>离愁别绪 | 怀才不遇 | 田园情趣 | 哲理感悟</p>"},
{title:"写作提升",tag:"yy",tagName:"语文",desc:"立意、选材、结构、语言",
content:"<h3>一、立意</h3><p><b>深刻：</b>透过现象看本质</p><p><b>新颖：</b>独特视角、个人体验</p><p><b>准确：</b>符合题意、积极健康</p><h3>二、选材</h3><p>真实：亲身经历或真实所见</p><p>典型：代表性强</p><p>独特：与众不同的角度</p><h3>三、结构</h3><p>起承转合 | 层层深入 | 正反对比 | 一线贯穿</p><h3>四、语言</h3><p>准确：措辞精确</p><p>鲜明：态度明确</p><p>生动：形象具体</p><p>文采：优美流畅</p>"}
],
"数学-高中":[
{title:"函数",tag:"sx",tagName:"数学",desc:"函数概念、性质、基本函数",
content:"<h3>一、函数概念</h3><p>函数：y = f(x)</p><p><b>定义域：</b>x的取值范围</p><p><b>值域：</b>y的取值范围</p><p><b>对应关系：</b>每一个x对应唯一的y</p><h3>二、函数性质</h3><p><b>单调性：</b>增函数（x₁ < x₂ → f(x₁) < f(x₂)）</p><p><b>奇偶性：</b>偶函数f(-x)=f(x)；奇函数f(-x)=-f(x)</p><p><b>周期性：</b>f(x+T)=f(x)</p><h3>三、基本函数</h3><p>一次函数：y = kx + b</p><p>二次函数：y = ax² + bx + c</p><p>指数函数：y = aˣ</p><p>对数函数：y = logₐx</p><p>三角函数：y = sinx, cosx, tanx</p>"},
{title:"导数",tag:"sx",tagName:"数学",desc:"导数公式、几何意义、应用",
content:"<h3>一、导数定义</h3><div class='formula'>f'(x) = lim(Δx→0) [f(x+Δx) - f(x)] / Δx</div><h3>二、求导公式</h3><div class='formula'>(xⁿ)' = nxⁿ⁻¹</div><div class='formula'>(sinx)' = cosx | (cosx)' = -sinx</div><div class='formula'>(eˣ)' = eˣ | (lnx)' = 1/x</div><div class='formula'>(aˣ)' = aˣlna | (logₐx)' = 1/(x·lna)</div><h3>三、导数几何意义</h3><p>切线斜率：k = f'(x₀)</p><div class='formula'>切线方程：y - f(x₀) = f'(x₀)(x - x₀)</div><h3>四、导数应用</h3><p>判断单调性</p><p>求极值：f'(x)=0</p><p>求最值</p><p>证明不等式</p>"},
{title:"数列",tag:"sx",tagName:"数学",desc:"等差数列、等比数列、递推",
content:"<h3>一、等差数列</h3><div class='formula'>通项：aₙ = a₁ + (n-1)d</div><div class='formula'>前n项和：Sₙ = n(a₁+aₙ)/2 = na₁ + n(n-1)d/2</div><h3>二、等比数列</h3><div class='formula'>通项：aₙ = a₁qⁿ⁻¹</div><div class='formula'>前n项和：Sₙ = a₁(1-qⁿ)/(1-q)（q≠1）</div><h3>三、递推数列</h3><p>由递推关系求通项</p><p>累加法、累乘法、构造法</p><h3>四、数学归纳法</h3><p>步骤：证明n=1时成立 → 假设n=k时成立 → 证明n=k+1时成立</p>"},
{title:"解析几何",tag:"sx",tagName:"数学",desc:"直线、圆、圆锥曲线",
content:"<h3>一、直线方程</h3><p>点斜式：y - y₀ = k(x - x₀)</p><p>斜截式：y = kx + b</p><p>一般式：Ax + By + C = 0</p><h3>二、圆</h3><div class='formula'>标准方程：(x-a)² + (y-b)² = r²</div><div class='formula'>一般方程：x² + y² + Dx + Ey + F = 0</div><h3>三、椭圆</h3><div class='formula'>标准方程：x²/a² + y²/b² = 1（a > b > 0）</div><p>a：长半轴，b：短半轴，c² = a² - b²</p><p>离心率：e = c/a</p><h3>四、双曲线与抛物线</h3><p>双曲线：x²/a² - y²/b² = 1</p><p>抛物线：y² = 2px</p>"}
],
"英语-高中":[
{title:"非谓语动词",tag:"yy2",tagName:"英语",desc:"动名词、分词、不定式",
content:"<h3>一、动名词（v-ing作主语/宾语）</h3><div class='example'>Seeing is believing. | I enjoy reading.</div><h3>二、分词（v-ing/v-ed作定语/状语/补语）</h3><p><b>现在分词（v-ing）：</b>主动、进行</p><p><b>过去分词（v-ed）：</b>被动、完成</p><div class='example'>The boiling water = The water which is boiling</div><div class='example'>The broken cup = The cup which was broken</div><h3>三、不定式（to do）</h3><p>作主语：To learn English is important.</p><p>作目的状语：I came here to study.</p><p>作宾补：I want you to go.</p>"},
{title:"从句",tag:"yy2",tagName:"英语",desc:"名词性从句、定语从句、状语从句",
content:"<h3>一、名词性从句</h3><p>主语从句、宾语从句、表语从句、同位语从句</p><p>连接词：that（无含义）、if/whether（是否）、what/who/which/where/when/why/how</p><div class='example'>What he said is true. | I don't know if he will come.</div><h3>二、定语从句</h3><p>关系代词：who（人）、whom（人）、which（物）、that（人/物）、whose</p><p>关系副词：where、when、why</p><div class='example'>The man who/that is standing there is my teacher.</div><h3>三、状语从句</h3><p>时间：when/while/as/before/after/since</p><p>条件：if/unless</p><p>原因：because/since/as</p><p>让步：although/though/even if</p>"},
{title:"虚拟语气",tag:"yy2",tagName:"英语",desc:"与现在/过去/将来相反的虚拟",
content:"<h3>一、与现在相反</h3><div class='formula'>从句：过去时（were/did）| 主句：would/could/might + 动词原形</div><div class='example'>If I were you, I would take this job.</div><h3>二、与过去相反</h3><div class='formula'>从句：过去完成时（had done）| 主句：would/could/might + have done</div><div class='example'>If I had studied hard, I would have passed the exam.</div><h3>三、与将来相反</h3><div class='formula'>从句：过去时（were to do / should do）| 主句：would/could/might + 动词原形</div><div class='example'>If it should rain tomorrow, I would stay home.</div><h3>四、wish后虚拟</h3><p>wish + were/did（与现在相反）</p><p>wish + had done（与过去相反）</p>"},
{title:"写作高级句型",tag:"yy2",tagName:"英语",desc:"倒装句、强调句、非谓语",
content:"<h3>一、倒装句</h3><p><b>部分倒装：</b>Only then did he realize his mistake.</p><p><b>完全倒装：</b>Here comes the bus.</p><p>否定词提前要倒装：Not only...but also...</p><h3>二、强调句</h3><div class='formula'>It is/was + 被强调部分 + that/who + 其余</div><div class='example'>It was because he was ill that he didn't come.</div><h3>三、非谓语作状语</h3><div class='example'>Seeing the teacher, the students stopped talking.</div><div class='example'>Given more time, I could do it better.</div><h3>四、高级表达</h3><p>With + n. + done（伴随状语）</p><div class='example'>With the problem solved, we felt relieved.</div>"}
],
"物理-高中":[
{title:"力学",tag:"wl",tagName:"物理",desc:"运动学、动力学、能量、动量",
content:"<h3>一、运动学</h3><div class='formula'>v = v₀ + at</div><div class='formula'>s = v₀t + ½at²</div><div class='formula'>v² - v₀² = 2as</div><h3>二、动力学</h3><p><b>牛顿三定律：</b></p><p>第一定律（惯性定律）</p><p>第二定律：F = ma</p><p>第三定律：作用力与反作用力</p><h3>三、能量</h3><p><b>动能定理：</b>W = ΔEk = ½mv² - ½mv₀²</p><p><b>机械能守恒：</b>（只有重力/弹力做功时）</p><h3>四、动量</h3><div class='formula'>动量定理：I = Δp</div><div class='formula'>动量守恒：m₁v₁ + m₂v₂ = m₁v₁' + m₂v₂'</div>"},
{title:"电磁学",tag:"wl",tagName:"物理",desc:"电场、电路、磁场、电磁感应",
content:"<h3>一、电场</h3><div class='formula'>库仑定律：F = kq₁q₂/r²</div><div class='formula'>电场强度：E = F/q</div><p>电场线：始于正电荷，止于负电荷</p><h3>二、电路</h3><p><b>欧姆定律：</b>I = U/R</p><p><b>串并联：</b>串联分压、并联分流</p><h3>三、磁场</h3><div class='formula'>安培力：F = BIL</div><div class='formula'>洛伦兹力：F = qvB</div><h3>四、电磁感应</h3><div class='formula'>法拉第定律：E = nΔΦ/Δt</div><p><b>楞次定律：</b>感应电流的磁场阻碍原磁场变化</p>"}
],
"化学-高中":[
{title:"物质结构",tag:"hx",tagName:"化学",desc:"原子结构、化学键、分子结构",
content:"<h3>一、原子结构</h3><p>原子核（质子+中子）+ 核外电子</p><p>电子排布规律：2-8-8-18...</p><h3>二、化学键</h3><p><b>离子键：</b>阴阳离子间静电作用</p><p><b>共价键：</b>原子间共用电子对</p><p><b>金属键：</b>金属离子与自由电子间作用</p><h3>三、分子结构</h3><p>VSEPR模型：判断分子空间构型</p><p>杂化轨道：sp/sp²/sp³</p><div class='highlight'>氢键：F、O、N与H形成的弱键，影响沸点、溶解度</div>"},
{title:"反应原理",tag:"hx",tagName:"化学",desc:"反应速率、化学平衡、水溶液",
content:"<h3>一、化学反应速率</h3><div class='formula'>v = Δc/Δt</div><p>影响因素：浓度、温度、压强、催化剂、接触面积</p><h3>二、化学平衡</h3><div class='formula'>平衡常数：K = [C]ᶜ[D]ᵈ / [A]ᵃ[B]ᵇ</div><p><b>勒夏特列原理：</b>平衡向减弱改变的方向移动</p><h3>三、水溶液</h3><p>pH = -lg[H⁺]</p><p><b>盐类水解：</b>强酸弱碱盐呈酸性，强碱弱酸盐呈碱性</p>"},
{title:"有机化学",tag:"hx",tagName:"化学",desc:"烃、官能团、有机反应",
content:"<h3>一、烃</h3><p><b>烷烃：</b>CₙH₂ₙ₊₂，饱和链烃</p><p><b>烯烃：</b>含C=C双键</p><p><b>炔烃：</b>含C≡C三键</p><p><b>芳香烃：</b>含苯环</p><h3>二、官能团</h3><p>-OH（羟基）、-CHO（醛基）、-COOH（羧基）、-COO-（酯基）</p><h3>三、有机反应</h3><p><b>取代反应：</b>卤代烃水解</p><p><b>加成反应：</b>烯烃加成</p><p><b>消去反应：</b>醇脱水</p><p><b>氧化反应：</b>燃烧、银镜反应</p>"}
]
};

var ls={get:function(k){try{return JSON.parse(localStorage.getItem(k))||{}}catch(e){return{}}},set:function(k,v){localStorage.setItem(k,JSON.stringify(v))}};

function toast(msg,type){
var t=document.getElementById('toast');
t.textContent=msg;t.className='toast'+(type?' '+type:'');t.style.display='block';
setTimeout(function(){t.style.display='none'},2500);
}

function go(page,param){
var pages=document.querySelectorAll('.page');
for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
document.getElementById('page-'+page).classList.add('active');
document.getElementById('headerActions').innerHTML='';
var titles={home:'好好学习',grade:'年级学科',knowledge:'知识学习',read:'阅读',quiz:'练习',progress:'学习进度'};
document.getElementById('headerTitle').textContent=titles[page]||page;
if(page==='home')renderHome();
if(page==='grade')renderGrade(param);
if(page==='knowledge')renderKnowledge(param);
if(page==='read')renderRead(param);
if(page==='quiz')renderQuiz(param);
if(page==='progress')renderProgress();
}

function renderHome(){
var html='<div class="stats"><div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">已学习</div></div><div class="stat-card"><div class="num" id="statRead">0</div><div class="label">已阅读</div></div><div class="stat-card"><div class="num" id="statQuiz">0</div><div class="label">已完成练习</div></div><div class="stat-card"><div class="num" id="statCorrect">0</div><div class="label">正确率%</div></div></div>';
html+='<div class="card"><div class="card-title">📚 选择年级开始学习</div><div class="grid">';
for(var i=0;i<GRADES.length;i++){
html+='<div class="sub-card" onclick="go(\'grade\',\''+GRADES[i].name+'\')"><div class="icon">'+GRADES[i].icon+'</div><div class="name">'+GRADES[i].name+'</div></div>';
}
html+='</div></div>';
html+='<div class="card"><div class="card-title">📊 学习进度</div>';
html+='<button class="btn btn-primary" onclick="go(\'progress\')">查看详细进度 →</button>';
html+='</div>';
document.getElementById('page-home').innerHTML=html;
updateHomeStats();
}

function updateHomeStats(){
var data=ls.get('studyData');
var total=data.learned?Object.keys(data.learned).length:0;
var read=data.read?Object.keys(data.read).length:0;
var quizDone=data.quizScore?Object.keys(data.quizScore).length:0;
var correct=0,totalQ=0;
if(data.quizScore){
for(var k in data.quizScore){
correct+=data.quizScore[k].correct||0;
totalQ+=data.quizScore[k].total||0;
}
}
document.getElementById('statTotal').textContent=total;
document.getElementById('statRead').textContent=read;
document.getElementById('statQuiz').textContent=quizDone;
document.getElementById('statCorrect').textContent=totalQ>0?Math.round(correct/totalQ*100):0;
}

function renderGrade(gradeName){
var subs=getSubjectsByGrade(gradeName);
var iconMap={语文:"📖",数学:"📐",英语:"🇬🇧",物理:"⚡",化学:"🧪",历史:"📜",地理:"🌍",生物学:"🧬"};
var html='<button class="back-btn" onclick="go(\'home\')">← 返回年级选择</button>';
html+='<div class="card"><div class="card-title">'+gradeName+' <span style="font-weight:400;color:#888;font-size:12px">'+subs.length+'个学科</span></div>';
html+='<div class="grid-2">';
for(var i=0;i<subs.length;i++){
var s=subs[i];
html+='<div class="item-card" onclick="go(\'knowledge\',\''+s.key+'\')">';
html+='<div class="title">'+iconMap[s.name]+' '+s.name+'</div>';
html+='<div class="meta"><span>'+s.items.length+'个知识点</span><span>'+getLearnedCount(s.key)+'已学</span></div>';
html+='</div>';
}
html+='</div></div>';
document.getElementById('page-grade').innerHTML=html;
}

function getLearnedCount(key){
var data=ls.get('studyData');
return data.learned&&data.learned[key]?data.learned[key].length:0;
}

function getSubjectsByGrade(gradeName){
var map={
"小学一年级":["语文-小学","数学-小学","英语-小学"],
"小学二年级":["语文-小学","数学-小学","英语-小学"],
"小学三年级":["语文-小学","数学-小学","英语-小学"],
"小学四年级":["语文-小学","数学-小学","英语-小学"],
"小学五年级":["语文-小学","数学-小学","英语-小学"],
"小学六年级":["语文-小学","数学-小学","英语-小学"],
"初中一年级":["语文-初中","数学-初中","英语-初中"],
"初中二年级":["语文-初中","数学-初中","英语-初中","物理-初中"],
"初中三年级":["语文-初中","数学-初中","英语-初中","物理-初中","化学-初中"],
"高中一年级":["语文-高中","数学-高中","英语-高中"],
"高中二年级":["语文-高中","数学-高中","英语-高中","物理-高中","化学-高中"],
"高中三年级":["语文-高中","数学-高中","英语-高中","物理-高中","化学-高中"]
};
var subs=map[gradeName]||[];
var result=[];
for(var i=0;i<subs.length;i++){
var key=subs[i];
var parts=key.split('-');
var name=parts[0];
if(KNOWLEDGE[key]){
result.push({key:key,name:name,items:KNOWLEDGE[key]});
}
}
return result;
}

var items=KNOWLEDGE[key]||[];
var name=key.split('-')[0];
var html='<button class="back-btn" onclick="go(\'home\')">← 返回年级</button>';
html+='<div class="card"><div class="card-title">'+name+' <span style="font-weight:400;color:#888;font-size:12px">'+items.length+'个知识模块</span></div></div>';
for(var i=0;i<items.length;i++){
var item=items[i];
html+='<div class="know-card" onclick="go(\'read\',\''+key+'|'+i+'\')">';
html+='<span class="tag tag-'+item.tag+'">'+item.tagName+'</span>';
html+='<h3>'+item.title+'</h3>';
html+='<p>'+item.desc+'</p>';
html+='<div class="points">';
html+='<span>📖 阅读学习</span>';
html+='<span>✏️ 练习测试</span>';
html+='</div></div>';
}
document.getElementById('page-knowledge').innerHTML=html;
document.getElementById('headerActions').innerHTML='<button class="btn btn-primary" onclick="go(\'quiz\',\''+key+'\')">✏️ 开始练习</button>';
}

function renderRead(param){
var parts=param.split('|');
var key=parts[0];
var idx=parseInt(parts[1]);
var item=KNOWLEDGE[key][idx];
var name=key.split('-')[0];
document.getElementById('headerActions').innerHTML='<button class="btn btn-success" onclick="markRead(\''+key+'\','+idx+')">✓ 已读完</button><button class="btn btn-primary" onclick="go(\'quiz\',\''+key+'\')">✏️ 练习</button>';
var html='<button class="back-btn" onclick="go(\'knowledge\',\''+key+'\')">← 返回知识列表</button>';
html+='<div class="read-section">';
html+='<h2>'+item.title+'</h2>';
html+=item.content;
html+='</div>';
document.getElementById('page-read').innerHTML=html;
window.scrollTo(0,0);
}

function markRead(key,idx){
var data=ls.get('studyData');
if(!data.read)data.read={};
if(!data.read[key])data.read[key]=[];
if(data.read[key].indexOf(idx)===-1)data.read[key].push(idx);
ls.set('studyData',data);
toast('已标记为已阅读！','success');
updateHomeStats();
}

function renderQuiz(key){
var quizz=getQuizByKey(key);
var name=key.split('-')[0];
if(!quizz||quizz.length===0){
document.getElementById('page-quiz').innerHTML='<button class="back-btn" onclick="go(\'knowledge\',\''+key+'\')">← 返回</button><div class="empty"><div class="icon">✏️</div>暂无练习题<br><br><button class="btn btn-primary" onclick="go(\'home\')">返回首页</button></div>';
return;
}
var q0=quizz[0];
var html='<button class="back-btn" onclick="go(\'knowledge\',\''+key+'\')">← 返回</button>';
html+='<div class="quiz-section"><h3>'+q0.title+'</h3>';
for(var i=0;i<q0.q.length;i++){
var qi=q0.q[i];
html+='<div class="quiz-item" id="qi'+i+'">';
html+='<div class="question">'+(i+1)+'. '+qi.q+'</div>';
html+='<div class="quiz-options">';
for(var j=0;j<qi.o.length;j++){
html+='<div class="quiz-option" onclick="selectOpt('+i+','+j+',\''+key+'\')" id="opt'+i+'_'+j+'">';
html+='<span class="opt">'+String.fromCharCode(65+j)+'.</span>';
html+='<span>'+qi.o[j]+'</span></div>';
}
html+='</div></div>';
}
html+='<button class="btn btn-primary" onclick="submitQuiz(\''+key+'\')">提交答案</button>';
html+='<div id="quizResult"></div></div>';
document.getElementById('page-quiz').innerHTML=html;
document.getElementById('headerActions').innerHTML='';
window._quizAnswers={};
}

function getQuizByKey(key){
var grade=key.split('-')[1];
if(QUIZZES[key])return QUIZZES[key];
if(grade==='小学')return QUIZZES["语文-小学"]||QUIZZES["数学-小学"];
if(grade==='初中')return QUIZZES["初中一年级"];
if(grade==='高中')return QUIZZES["高中"];
return null;
}

function selectOpt(qIdx,optIdx,key){
if(window._quizAnswers['q'+qIdx]!==undefined)return;
window._quizAnswers['q'+qIdx]=optIdx;
document.querySelectorAll('#qi'+qIdx+' .quiz-option').forEach(function(el,idx){
el.classList.toggle('selected',idx===optIdx);
});
}

function submitQuiz(key){
var quizz=getQuizByKey(key);
if(!quizz||!quizz[0])return;
var q0=quizz[0];
var correct=0,total=q0.q.length;
for(var i=0;i<q0.q.length;i++){
var userAns=window._quizAnswers['q'+i];
if(userAns===undefined)continue;
var isCorrect=userAns===q0.q[i].a;
if(isCorrect)correct++;
document.getElementById('opt'+i+'_'+userAns).classList.add(isCorrect?'correct':'wrong');
if(!isCorrect){
document.getElementById('opt'+i+'_'+q0.q[i].a).classList.add('correct');
}
}
var score=Math.round(correct/total*100);
var resultHtml='<div class="quiz-item"><h3>答题结果</h3>';
resultHtml+='<p>正确：'+correct+'/'+total+'（'+score+'%）</p>';
resultHtml+='<div class="progress-bar"><div class="fill" style="width:'+score+'%;background:'+(score>=60?'#38a169':'#e53e3e')+'"></div></div>';
resultHtml+='<button class="btn btn-primary" onclick="go(\'quiz\',\''+key+'\')">再练一次</button>';
resultHtml+='<button class="btn btn-secondary" onclick="go(\'home\')">返回首页</button></div>';
document.getElementById('quizResult').innerHTML=resultHtml;
var data=ls.get('studyData');
if(!data.quizScore)data.quizScore={};
data.quizScore[key]={correct:correct,total:total,score:score,date:new Date().toISOString()};
ls.set('studyData',data);
updateHomeStats();
toast(score>=60?'🎉 合格！':'加油！',score>=60?'success':'error');
}

function renderProgress(){
var data=ls.get('studyData');
var html='<button class="back-btn" onclick="go(\'home\')">← 返回首页</button>';
html+='<div class="card"><div class="card-title">📊 学习进度总览</div>';
html+='<div class="stats" style="margin-bottom:16px">';
html+='<div class="stat-card"><div class="num">'+(data.learned?Object.keys(data.learned).length:0)+'</div><div class="label">已学习学科</div></div>';
html+='<div class="stat-card"><div class="num">'+(data.read?Object.keys(data.read).length:0)+'</div><div class="label">已阅读知识点</div></div>';
html+='<div class="stat-card"><div class="num">'+(data.quizScore?Object.keys(data.quizScore).length:0)+'</div><div class="label">完成练习</div></div>';
html+='</div></div>';
if(data.quizScore){
html+='<div class="card"><div class="card-title">✏️ 练习成绩</div>';
for(var k in data.quizScore){
var qs=data.quizScore[k];
html+='<div style="padding:8px 0;border-bottom:1px solid #f0f0f0">';
html+='<strong>'+k+'</strong>：'+qs.correct+'/'+qs.total+'（'+qs.score+'%）';
html+='</div>';
}
html+='</div>';
}
if(data.read){
html+='<div class="card"><div class="card-title">📖 已阅读</div>';
for(var k in data.read){
html+='<div style="padding:8px 0;border-bottom:1px solid #f0f0f0">';
html+='<strong>'+k+'</strong>：'+data.read[k].length+'个知识点';
html+='</div>';
}
html+='</div>';
}
document.getElementById('page-progress').innerHTML=html;
}

function initNav(){
var navHtml='<div class="nav-section">年级</div>';
for(var i=0;i<GRADES.length;i++){
navHtml+='<div class="nav-item" onclick="go(\'grade\',\''+GRADES[i].name+'\')"><span>'+GRADES[i].icon+'</span><span>'+GRADES[i].name+'</span></div>';
}
document.getElementById('navList').innerHTML=navHtml;
}

initNav();
go('home');
</script>
