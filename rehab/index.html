function go(page,partName){
var pages=document.querySelectorAll('.page');
for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
if(page==='part'&&partName){
var p=null;
for(var i=0;i<PARTS.length;i++)if(PARTS[i].name===partName){p=PARTS[i];break;}
if(p)renderPart(p);
document.getElementById('page-part').classList.add('active');
document.getElementById('headerTitle').textContent=p.name;
}else{
document.getElementById('page-home').classList.add('active');
document.getElementById('headerTitle').textContent='天天向上';
if(page==='home')renderHome();
}
var navBtns=document.querySelectorAll('.nav-item');
for(var i=0;i<navBtns.length;i++)navBtns[i].classList.remove('active');
}

function renderHome(){
var html='<div class="card"><div class="card-title">🦴 身体部位</div><div class="part-grid">';
for(var i=0;i<PARTS.length;i++){
var p=PARTS[i];
html+='<div class="part-card" onclick="go(\'part\',\''+p.name+'\')"><div class="icon">'+p.icon+'</div><div class="name">'+p.name+'</div><div class="desc">'+p.category+'</div></div>';
}
html+='</div></div>';
document.getElementById('page-home').innerHTML=html;
var navHtml='';
var categories={};
for(var i=0;i<PARTS.length;i++){
var c=PARTS[i].category;
if(!categories[c])categories[c]=[];
categories[c].push(PARTS[i]);
}
var catOrder=['上肢','脊柱','骨盆髋','下肢','其他'];
for(var ci=0;ci<catOrder.length;ci++){
var c=catOrder[ci];
if(!categories[c])continue;
navHtml+='<div class="nav-section">'+c+'</div>';
for(var j=0;j<categories[c].length;j++){
var p=categories[c][j];
navHtml+='<div class="nav-item" onclick="go(\'part\',\''+p.name+'\')"><span>'+p.icon+'</span><span>'+p.name+'</span></div>';
}
}
document.getElementById('navList').innerHTML=navHtml;
}

function renderPart(p){
var html='<button class="back-btn" onclick="go(\'home\')">← 返回部位列表</button>';
html+='<div class="section-block"><div class="section-hd" onclick="toggleSection(this)"><span class="tag tag-blue">解剖</span><h3>解剖结构</h3><span class="arrow">▼</span></div><div class="section-body"><p style="font-size:12px;color:#555;line-height:1.8">'+p.anatomy+'</p></div></div>';
html+='<div class="section-block"><div class="section-hd" onclick="toggleSection(this)"><span class="tag tag-red">评估</span><h3>常见问题与判断</h3><span class="arrow">▼</span></div><div class="section-body">';
for(var i=0;i<p.assess.length;i++){
var a=p.assess[i];
html+='<div class="item"><h4><span class="tag tag-'+a.tag+'">'+a.tag+'</span> '+a.title+'</h4>';
if(a.signs&&a.signs.length>0){
html+='<strong style="font-size:11px;color:#1b4332">自测指征：</strong><ul>';
for(var j=0;j<a.signs.length;j++)html+='<li>'+a.signs[j]+'</li>';
html+='</ul>';
}
if(a.tests&&a.tests.length>0){
html+='<strong style="font-size:11px;color:#1b4332">检查方法：</strong><ul>';
for(var j=0;j<a.tests.length;j++)html+='<li>'+a.tests[j]+'</li>';
html+='</ul>';
}
html+='</div>';
}
html+='</div></div>';
html+='<div class="section-block"><div class="section-hd" onclick="toggleSection(this)"><span class="tag tag-green">训练</span><h3>康复训练动作</h3><span class="arrow">▼</span></div><div class="section-body"><div class="train-grid">';
for(var i=0;i<p.train.length;i++){
var t=p.train[i];
html+='<div class="train-card"><div class="name">'+t.name+'</div><div class="desc">'+t.desc+'</div><span class="difficulty diff-'+t.difficulty+'">'+{easy:'简单',medium:'中等',hard:'困难}[t.difficulty]+'</span></div>';
}
html+='</div></div></div>';
html+='<div class="section-block"><div class="section-hd" onclick="toggleSection(this)"><span class="tag tag-purple">预防</span><h3>预防措施</h3><span class="arrow">▼</span></div><div class="section-body"><ul>';
for(var i=0;i<p.prevention.length;i++)html+='<li style="font-size:12px;color:#555;margin-bottom:6px;line-height:1.7">'+p.prevention[i]+'</li>';
html+='</ul></div></div>';
document.getElementById('page-part').innerHTML=html;
}

function toggleSection(el){
var body=el.nextElementSibling;
var isOpen=body.classList.contains('open');
body.classList.toggle('open');
el.classList.toggle('open',!isOpen);
}

renderHome();
